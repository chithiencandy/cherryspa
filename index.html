<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cherry Spa – Nơi Nhan Sắc Nở Hoa, Bình Yên Tái Sinh</title>
    <meta name="description" content="Cherry Spa - Trải nghiệm làm đẹp & thư giãn cao cấp tại Mỹ Tho, tỉnh Đồng Tháp. Phun xăm thẩm mỹ, nối mi, massage thư giãn, gội đầu dưỡng sinh, làm nail và chăm sóc da.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/src/css/input.css">

<body>
    {{> header }}
    {{> hero }}
    {{> about }}
    {{> services }}
    {{> classes }}
    {{> gallery }}
    {{> testimonials }}
    {{> booking }}
    {{> footer }}

    <!-- Floating Social Icons -->
    <div class="fixed bottom-6 right-6 z-50 flex flex-col gap-3">
        <a href="https://zalo.me/0388888977" target="_blank" rel="noopener noreferrer" class="bg-blue-500 text-white p-3 rounded-full shadow-lg hover:bg-blue-600 transition-all hover:-translate-y-1 hover:shadow-xl group flex items-center justify-center relative" aria-label="Zalo">
